<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
</head>
<body>

   <header>
        <nav style="text-align: right;">
            <a href="index.html">HOME</a> | <a href="eventos.html">EVENTOS</a> | <a href="contato.html">CONTATO</a> | <a href="sobre.html">SOBRE</a> | <a href="login.html">ENTRAR</a>
        </nav>
        <img src="img/Logo.jpg" alt="Instituto Federal São Paulo" width="300">
    </header>

    <h2>Mande uma mensagem</h2>

    <form action="#" method="post">
        <ul>
            <li>
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome">
            </li>
            <li>
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email">
            </li>
            <li>
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" pattern="\([0-9]{2}\) [0-9]{5}-[0-9]{4}" required> (99) 99999-9999
            </li>
            <li>
                <label for="assunto">Assunto</label>
                <select name="assunto" id="assunto">
                    <option value="">-- Selecione --</option>
                    <option value="reclamacao">Reclamação</option>
                    <option value="sugestao">Sugestão</option>
                </select>
            </li>
            <li>
                <label for="mensagem" style="vertical-align: top;">Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="3" cols="30"></textarea>
            </li>
            <li>
                <fieldset>
                    <legend>Opções de Resposta</legend>
                    E-Mail <input type="checkbox" name="opcao_email" value="email">
                    Telefone <input type="checkbox" name="opcao_telefone" value="telefone">
                </fieldset>
            </li>
            <li>
                <input type="submit" value="Enviar">
            </li>
        </ul>
    </form>

    <br><br><br>

    <footer>
        <a href="https://www.facebook.com/ifsppirituba/?locale=pt_BR" target="_blank">
            <img src="img/facebook.png" alt="Facebook" width="40">
        </a>
        <p>IFSP - Câmpus Pirituba - Av. Mutinga, 951 - Jardim Santo Elias - CEP: 05110-000 - São Paulo/SP - Contato: (011) 2504-0100</p>
    </footer>

</body>
</html>
